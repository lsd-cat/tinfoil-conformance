id: 074-in-toto-statement-extra-field
stage: verify-sigstore
title: |
  In-toto statement with an unknown extra top-level field must still verify (forward-compat).
spec_refs: ["5.4"]
expects:
  exit_code: 0
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
  sigstore.in_toto_statement_tolerates_extra_fields: true
fixture_kind: synthetic
notes: |
  Adds `'_spec_version': 99` to the in-toto statement before signing.
  Rust/JS/Python tolerate unknown fields and accept; sigstore-go's
  in-toto parser is strict and rejects. Gated on the
  `in_toto_statement_tolerates_extra_fields` capability so Go
  skips honestly rather than failing.
