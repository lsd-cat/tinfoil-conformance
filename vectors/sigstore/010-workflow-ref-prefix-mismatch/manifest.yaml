id: 010-workflow-ref-prefix-mismatch
stage: verify-sigstore
title: |
  policy.workflow_ref_prefix that does not match the cert's ref must be rejected.
spec_refs: ["5.3"]
expects:
  exit_code: 10
  rejection_code: "WORKFLOW_REF_PREFIX_MISMATCH"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: real-frozen-policy-variation
notes: |
  Same bundle as 001. We tighten policy.workflow_ref_prefix to a value
  that doesn't match the cert's actual workflow ref. SDKs implement the
  check differently (Rust applies a regex on BuildSignerURI, JS calls
  .startsWith() on the cert's GitHubWorkflowRef extension) — both must
  reject with the same code.
