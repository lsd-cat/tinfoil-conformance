id: 032-dsse-signature-bit-flipped
stage: verify-sigstore
title: |
  Bundle with one bit flipped in the DSSE signature must reject with DSSE_SIGNATURE_INVALID.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: "DSSE_SIGNATURE_INVALID"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: real-frozen-bundle-mutation
notes: |
  The DSSE signature bytes (signatures[0].sig) are separate from the
  signed payload, so we can corrupt them without touching the in-toto
  statement. One bit is flipped; SDKs reach signature verification
  and reject.
