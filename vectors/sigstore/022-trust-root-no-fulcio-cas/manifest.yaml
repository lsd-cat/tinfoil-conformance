id: 022-trust-root-no-fulcio-cas
stage: verify-sigstore
title: |
  Trust root with no Fulcio CAs must cause FULCIO_CHAIN_INVALID.
spec_refs: ["5.1", "5.2"]
expects:
  exit_code: 10
  rejection_code: "FULCIO_CHAIN_INVALID"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: "supported"
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: real-frozen-trust-root-mutation
notes: |
  Removes all Fulcio certificate authorities. The signing cert cannot
  chain to any trusted root. Both SDKs must reject.
  NOTE: sigstore-browser may surface SCT-related errors first (SCT
  verification calls find_issuer_spki, which also needs the Fulcio
  CAs) — that's why we keep this co-anchored to SPEC §5.1 + §5.2.
